name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore FreemanSaveEditor.sln

      - name: Build solution
        run: |
          msbuild FreemanSaveEditor.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: FreemanSaveEditor
          path: |
            **/bin/Release/**
