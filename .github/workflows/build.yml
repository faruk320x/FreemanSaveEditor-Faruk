name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore FreemanSaveEditor.sln

      - name: Build
        run: msbuild FreemanSaveEditor.sln /p:Configuration=Release /p:Platform="Any CPU" /p:VisualStudioVersion=17.0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreemanSaveEditor
          path: |
            **/bin/Release/**
